# Rendered through envsubst (MINIO_ROOT_USER, MINIO_ROOT_PASSWORD).
apiVersion: v1
kind: Namespace
metadata: {name: minio}
---
apiVersion: v1
kind: Secret
metadata: {name: minio-creds, namespace: minio}
type: Opaque
stringData:
  MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: minio-data, namespace: minio}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: standard
  resources: {requests: {storage: 6Gi}}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: minio, namespace: minio}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: minio}}
  template:
    metadata: {labels: {app: minio}}
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2025-04-08T15-41-24Z
        args: ["server", "/data", "--console-address", ":9001"]
        envFrom: [{secretRef: {name: minio-creds}}]
        ports: [{containerPort: 9000, name: s3}, {containerPort: 9001, name: console}]
        resources: {requests: {cpu: 50m, memory: 256Mi}, limits: {memory: 512Mi}}
        volumeMounts: [{name: data, mountPath: /data}]
        readinessProbe: {httpGet: {path: /minio/health/ready, port: 9000}, initialDelaySeconds: 5, periodSeconds: 5}
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: minio-data}
---
apiVersion: v1
kind: Service
metadata: {name: minio, namespace: minio}
spec:
  selector: {app: minio}
  ports:
  - {name: s3, port: 9000, targetPort: 9000}
  - {name: console, port: 9001, targetPort: 9001}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: minio-s3, namespace: minio}
spec:
  ingressClassName: contour
  rules:
  - host: s3.local
    http: {paths: [{path: /, pathType: Prefix, backend: {service: {name: minio, port: {number: 9000}}}}]}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: {name: minio-console, namespace: minio}
spec:
  ingressClassName: contour
  rules:
  - host: minio.local
    http: {paths: [{path: /, pathType: Prefix, backend: {service: {name: minio, port: {number: 9001}}}}]}
